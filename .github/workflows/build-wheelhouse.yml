name: Build Wheelhouse

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Download packages
        run: |
          pip download -r requirements.txt -d wheelhouse

      - name: Compress wheelhouse
        run: |
          powershell Compress-Archive -Path wheelhouse -DestinationPath wheelhouse-python312-win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-python312-win64
          path: wheelhouse-python312-win64.zip